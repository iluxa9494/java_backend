spring:
  config:
    activate:
      on-profile: prod
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: friend-recommendations
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      enable-idempotence: true
      acks: all
      retries: 3
      max-in-flight-requests-per-connection: 1
    topic:
      friend-request: friend-request
#      like: like
#      comment: comment
#      reply: reply
#      post: post
#      message: message

  application:
    name: ms-friend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: ${SPRING_LIQUIBASE_CHANGE_LOG}
server:
  port: 8084

outbox:
  cleanup:
    retention-days: ${OUTBOX_CLEANUP_RETENTION_DAYS:3} # частота очистки outbox

kafka-publisher-emergency:
  max-attempts: ${KAFKA_PUBLISHER_EMERGENCY_MAX_ATTEMPTS:5}
  fixed-delay: ${KAFKA_PUBLISHER_EMERGENCY_FIXED_DELAY:180000} # ms
  batch-size: ${KAFKA_PUBLISHER_EMERGENCY_BATCH_SIZE:20}
  timeout: ${KAFKA_PUBLISHER_EMERGENCY_TIMEOUT:5} # seconds

app:
  auth-service:
    jwt-validation:
      enabled: true # обязательно true
  account-service:
    enabled: true # обязательно true
  recommendation-service:
    enabled: true # обязтельное поле
feign:
  clients:
    auth-service:
      name: ${FEIGN_AUTH_SERVICE_NAME}
      url: ${FEIGN_AUTH_SERVICE_URL}
    account-service:
      name: ${FEIGN_ACCOUNT_SERVICE_NAME}
      url: ${FEIGN_ACCOUNT_SERVICE_URL}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE}

logging:
  level:
    ru.skillbox.socialnetwork: INFO

