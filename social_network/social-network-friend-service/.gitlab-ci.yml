stages:
  - build
  - deploy

variables:
  DOCKER_USER: rumyancevivan
  APP_NAME: ms-friend
  CONTAINER_NAME: ms-friend
  SERVER_DIR: /home/javapro_team58/ms-friend

before_script:
  - export IMAGE_TAG="$(date +%Y%m%d-%H%M%S)"

build_image:
  stage: build
  script:
    - mvn clean package -DskipTests

    - docker build -t $DOCKER_USER/$APP_NAME:$IMAGE_TAG .

    - echo "$DOCKER_PASSWORD_MS_FRIEND" | docker login -u "$DOCKER_USER" --password-stdin

    - docker push $DOCKER_USER/$APP_NAME:$IMAGE_TAG

    - echo $IMAGE_TAG > image_tag.txt
  artifacts:
    paths:
      - image_tag.txt
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy_to_server:
  stage: deploy
  timeout: 30 minutes
  script:
    - export IMAGE_TAG=$(cat image_tag.txt)
    - cd $SERVER_DIR
    - |
      echo "Удаляем старые бэкапы..."
      docker images --filter "reference=$DOCKER_USER/$APP_NAME:backup-*" -q | while read -r id; do
      docker rmi $id 2>/dev/null || true
      done

    - |
      if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
        echo "Создаём бэкап контейнера..."
        docker commit $CONTAINER_NAME $DOCKER_USER/$APP_NAME:backup-$(date +%F)
      else
        echo "Контейнер $CONTAINER_NAME не запущен — бэкап не требуется"
      fi

    - docker stop $CONTAINER_NAME || true
    - docker rm $CONTAINER_NAME || true
    - DOCKER_IMAGE=$DOCKER_USER/$APP_NAME:$IMAGE_TAG docker compose -f docker-compose-prod.yml up -d
    - docker image prune -f
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'