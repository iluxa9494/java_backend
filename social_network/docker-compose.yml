services:
  # =========================
  # INFRA
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
      # оставляем, но на healthcheck больше не завязаны (т.к. whitelist у тебя фактически не применяется)
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,stat,conf,isro,srvr"
    ports:
      - "2181:2181"
    healthcheck:
      # НЕ используем ruok -> проверяем, что порт открыт
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2181"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 20s
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # internal + host listeners
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    volumes:
      - kafka_data:/var/lib/kafka/data

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis_db:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "redis"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - minio_data:/data

  # =========================
  # CORE: EUREKA + GATEWAY
  # =========================
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
      args:
        APP_PORT: "8761"
    restart: unless-stopped
    ports:
      - "8761:8761"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    volumes:
      - maven_repo:/root/.m2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8761/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 25s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      args:
        APP_PORT: "8080"
    restart: unless-stopped
    ports:
      - "8765:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - maven_repo:/root/.m2

  # =========================
  # SERVICES (JAVA)
  # =========================
  mc-authentication:
    build:
      context: ./mc-authentication
      dockerfile: Dockerfile
      args:
        APP_PORT: "8081"
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      redis_db:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis_db
      SPRING_DATA_REDIS_PASSWORD: redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/auth
    volumes:
      - maven_repo:/root/.m2

  mc-account:
    build:
      context: ./mc-account
      dockerfile: Dockerfile
      args:
        APP_PORT: "8088"
    restart: unless-stopped
    ports:
      - "8088:8088"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      redis_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis_db
      SPRING_DATA_REDIS_PASSWORD: redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/account_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - maven_repo:/root/.m2

  ms-notification:
    build:
      context: ./ms-notification
      dockerfile: Dockerfile
      args:
        APP_PORT: "8083"
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - maven_repo:/root/.m2

  social-network-friend-service:
    build:
      context: ./social-network-friend-service
      dockerfile: Dockerfile
      args:
        APP_PORT: "8084"
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mc-account:
        condition: service_started
      mc-authentication:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      APP_AUTH_SERVICE_ENABLED: "true"
      APP_ACCOUNT_SERVICE_ENABLED: "true"
      APP_RECOMMENDATION_SERVICE_ENABLED: "false"

      FEIGN_AUTH_SERVICE_NAME: mc-authentication
      FEIGN_AUTH_SERVICE_URL: http://mc-authentication:8081

      FEIGN_ACCOUNT_SERVICE_NAME: mc-account
      FEIGN_ACCOUNT_SERVICE_URL: http://mc-account:8088

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/friend_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - maven_repo:/root/.m2

  social-network-post:
    build:
      context: ./social-network-post
      dockerfile: Dockerfile
      args:
        APP_PORT: "8085"
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/post_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - maven_repo:/root/.m2

  dialog_service:
    build:
      context: ./dialog_service
      dockerfile: Dockerfile
      args:
        APP_PORT: "8082"
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/dialog_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - maven_repo:/root/.m2

  social-network-integration:
    build:
      context: ./social-network-integration
      dockerfile: Dockerfile
      args:
        APP_PORT: "8086"
    restart: unless-stopped
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_KEY: minioadmin
    volumes:
      - maven_repo:/root/.m2

  # =========================
  # FRONTEND (NODE/NGINX) — НЕ MAVEN
  # =========================
  social-network-frontend:
    build:
      context: ./social-network-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  postgres_data:
  redis_data:
  mongo_data:
  minio_data:
  maven_repo: