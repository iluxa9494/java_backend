stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: vav396/mc-account:latest
  SERVER_USER: vav
  SERVER_HOST: 79.174.81.229
  SERVER_PORT: 22

# Сборка и публикация образа
build_image:
  stage: build
  image: maven:3.8.6-openjdk-11
  script:
    - mvn clean package -DskipTests
    - docker build -t $DOCKER_IMAGE .
    - docker login -u vav396 -p $DOCKER_PASSWORD
    - docker push $DOCKER_IMAGE
  only:
    - master

# Деплой с безопасным переключением
deploy_to_server:
  stage: deploy
  script:
    - echo "🚀 Начинаем безопасное обновление mc-account"
    - cd /home/javapro_team58/mc-account
    - echo "🛑 Останавливаем и удаляем старый контейнер..."
    - docker stop mc-account || true
    - docker rm mc-account || true
    - echo "🔐 Проверяем наличие пароля от БД..."
    - if [ -z "$DB_ACCOUNT_PASSWORD" ]; then echo "❌ DB_ACCOUNT_PASSWORD не задана!"; exit 1; else echo "✅ Пароль есть, продолжаем..."; fi
    - echo "🟢 Запускаем новый mc-account..."
    - docker run -d --name mc-account --network infrastructure_social-network -p 9050:8088 -e SPRING_PROFILES_ACTIVE=prod -e SERVER_PORT=8088 -e eureka.client.service-url.defaultZone=http://ms-eureka:8761/eureka/ -e EUREKA_CLIENT_REGISTER-WITH-EUREKA=true -e EUREKA_CLIENT_FETCH-REGISTRY=true -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/account_db -e SPRING_DATASOURCE_USERNAME=postgres -e SPRING_DATASOURCE_PASSWORD=$DB_ACCOUNT_PASSWORD -e SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092 -e SPRING_DATA_REDIS_HOST=redis-mc-account -e SPRING_DATA_REDIS_PORT=6379 vav396/mc-account:latest
    - echo "⏳ Ожидаем запуска приложения..."
    - timeout 120 bash -c 'while ! docker logs mc-account 2>&1 | grep -q "Started McAccountApplication"; do sleep 3; done' || (echo "❌ Время ожидания истекло" && docker logs mc-account --tail 30 && exit 1)
    - echo "✅ Проверяем статус:"
    - docker ps | grep mc-account
    - docker logs mc-account --tail 20
  only:
    - master

# Настройка ACL Kafka (запуск вручную)
setup_kafka_acls:
  stage: deploy
  script:
    - echo "🔐 Setting up Kafka ACL permissions..."
    - echo "⏳ Waiting for Kafka to start..."
    - sleep 60
    - echo "🔍 Checking if Kafka is ready..."
    - |
      until docker exec kafka-broker kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1; do
        echo "🟡 Waiting for Kafka broker..."
        sleep 10
      done
    - echo "✅ Kafka is ready"
    - |
      docker exec kafka-broker kafka-acls \
        --bootstrap-server localhost:9092 \
        --add \
        --allow-principal User:mc-authentication \
        --operation Write \
        --topic user-topic
    - |
      docker exec kafka-broker kafka-acls \
        --bootstrap-server localhost:9092 \
        --add \
        --allow-principal User:mc-account \
        --operation Read \
        --topic user-topic
    - |
      docker exec kafka-broker kafka-acls \
        --bootstrap-server localhost:9092 \
        --add \
        --deny-principal User:* \
        --operation All \
        --topic user-topic
    - echo "✅ Kafka ACL permissions configured successfully!"
  only:
    - master
  when: manual