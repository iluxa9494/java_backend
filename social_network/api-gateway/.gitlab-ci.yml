stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: vav396/api-gateway:latest
  SERVER_USER: mvsbx
  SERVER_HOST: 185.129.146.54
  SERVER_PORT: 2222

build_image:
  stage: build
  image: maven:3.9-openjdk-21
  script:
    - mvn clean package -DskipTests
    - docker build -t $DOCKER_IMAGE .
    - docker login -u vav396 -p $DOCKER_PASSWORD
    - docker push $DOCKER_IMAGE
  only:
    - master

deploy_to_server:
  stage: deploy
  script:
    - echo "Обновляем api-gateway с использованием Docker Compose"
    - cd /home/javapro_team58/api-gateway
    - docker compose down || echo "Контейнер не был запущен"
    - docker pull vav396/api-gateway:latest
    - docker compose up -d --force-recreate
    - docker image prune -f

  only:
    - master