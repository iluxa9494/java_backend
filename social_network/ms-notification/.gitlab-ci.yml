stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: "iluxa9494/ms-notification:latest"

.default-tags:
  tags:
    - ms-notification

test:
  stage: test
  extends: .default-tags
  script:
    - mvn -B -ntp -DskipTests verify

build_image:
  stage: build
  extends: .default-tags
  script:
    - mvn -B -ntp -DskipTests clean package
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - docker build -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"
  needs:
    - test
  only:
    - master

deploy_to_server:
  stage: deploy
  extends: .default-tags
  script:
    - docker compose -f /home/javapro_team58/ms-notification/docker-compose.yml pull ms-notification
    - docker compose -f /home/javapro_team58/ms-notification/docker-compose.yml up -d --no-deps ms-notification
    - curl -sS -m 5 http://localhost:8765/ms-notification/actuator/health || true
  needs:
    - build_image
  only:
    - master