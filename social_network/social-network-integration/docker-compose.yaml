version: '3.8'
services:
  redis:
    image: redis:7.2-alpine
    container_name: redis_db
    ports:
      - "6379:6379"
    volumes:
      - "redis_data:/data"
    command:
      - redis-server
      - --requirepass redis
      - --appendfsync everysec
      - --protected-mode no
    networks:
      - social-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: miniominio
      MINIO_ROOT_PASSWORD: miniominio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - social-network

volumes:
  redis_data:
  minio_data:

networks:
  social-network:
    driver: bridge