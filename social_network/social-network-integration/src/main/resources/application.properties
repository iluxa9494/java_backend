# Application Configuration
server.port=8089
spring.application.name=integration

# Geo Configuration
geo.base-country-url=${GEO_BASE_COUNTRY_URL:https://api.hh.ru/areas/countries}
geo.redis.all-country-key=geo:countries:key
geo.schedule.delay.initial-delay-seconds=5
geo.schedule.delay.update-delay-months=${GEO_SCHEDULE_UPDATE_DELAY_MONTHS:3}

# HTTP Client Configuration
client.connect-timeout-seconds=10
client.read-timeout-seconds=20

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:redis}
spring.data.redis.timeout=2000ms

# File Upload Configuration
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:10MB}

#Security Configuration
security.authenticate.url=${SECURITY_AUTH_URL:http://localhost:8091}
security.authenticate.path=${SECURITY_AUTH_PATH:api/v1/auth/validate}


# Storage Configuration
storage.access-key-id=${STORAGE_ACCESS_KEY_ID:local-access-key}
storage.secret-key=${STORAGE_SECRET_KEY:local-secret-key}
storage.region=ru-central1
storage.s3.endpoint=${STORAGE_S3_ENDPOINT:http://localhost:9000}
storage.s3.bucket-name=${STORAGE_S3_BUCKET_NAME:skb44gr}
storage.schedule.delay.initial-delay-seconds=5

