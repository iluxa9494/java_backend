stages:
  - build
  - deploy

variables:
  DOCKER_USER: docode97
  APP_NAME: mc-authentication
  CONTAINER_NAME: mc-authentication
  SERVER_DIR: /srv/microservices/mc-authentication

build_image:
  stage: build
  tags:
    - shell
  script:
    - export IMAGE_TAG="$(date +%Y%m%d-%H%M%S)"
    - echo "=== Сборка проекта ==="
    - mvn clean package -DskipTests
    - docker build -t $DOCKER_USER/$APP_NAME:$IMAGE_TAG -t $DOCKER_USER/$APP_NAME:latest .
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - echo "=== Публикация Docker-образов ==="
    - docker push $DOCKER_USER/$APP_NAME:$IMAGE_TAG
    - docker push $DOCKER_USER/$APP_NAME:latest
    - echo $IMAGE_TAG > image_tag.txt
  artifacts:
    paths:
      - image_tag.txt
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy_to_server:
  stage: deploy
  tags:
    - shell
  timeout: 30 minutes
  script:
    - cd $SERVER_DIR
    - cp $CI_PROJECT_DIR/image_tag.txt .
    - export IMAGE_TAG=$(cat image_tag.txt)
    - |
      echo "Удаляем старые бэкапы..."
      docker images --filter "reference=$DOCKER_USER/$APP_NAME:backup-*" -q | while read -r id; do
      docker rmi $id 2>/dev/null || true
      done

    - |
      if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
        echo "Создаём бэкап контейнера..."
        docker commit $CONTAINER_NAME $DOCKER_USER/$APP_NAME:backup-$(date +%F)
      else
        echo "Контейнер $CONTAINER_NAME не запущен — бэкап не требуется"
      fi

    - docker stop $CONTAINER_NAME || true
    - docker rm $CONTAINER_NAME || true
    - sed -i "s|DOCKER_IMAGE=.*|DOCKER_IMAGE=$DOCKER_USER/$APP_NAME:$IMAGE_TAG|g" .env
    - docker compose -f docker-compose.yml up -d
    - docker image prune -f
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
