services:
  mysql:
    image: mysql:8.4
    container_name: vk_insight_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: vk_users
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  mysql_data: