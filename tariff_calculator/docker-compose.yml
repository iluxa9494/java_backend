services:
  postgres:
    image: postgres:14
    container_name: fastdelivery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tariffdb}
      POSTGRES_USER: ${POSTGRES_USER:-fastuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fastpass}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fastuser} -d ${POSTGRES_DB:-tariffdb}"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tariff-calculator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tariffdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-fastuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-fastpass}
      SPRING_FLYWAY_ENABLED: "true"

      # чтобы логи сразу в консоль и без буфера
      SPRING_MAIN_BANNER_MODE: "off"
    ports:
      - "8001:8080"
      - "17001:7001"
    volumes:
      # код монтируем внутрь — правки на хосте сразу видны контейнеру
      - ./:/workspace
      # кеш Maven отдельно (ускоряет)
      - m2_cache:/workspace/.m2
    working_dir: /workspace
    command: ["mvn", "-pl", "app", "-am", "-DskipTests", "spring-boot:run"]

volumes:
  pgdata:
  m2_cache: