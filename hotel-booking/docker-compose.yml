services:
  postgres:
    image: postgres:16
    container_name: hotel-booking-postgres
    environment:
      POSTGRES_DB: hotel_booking
      POSTGRES_USER: hotel_admin
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_admin -d hotel_booking"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [hotel-net]

  mongodb:
    image: mongo:7
    container_name: hotel-booking-mongodb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [hotel-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: hotel-booking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [hotel-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: hotel-booking-kafka
    depends_on:
      - zookeeper
    command: >
      bash -c "
        echo 'Waiting for ZooKeeper to be ready...' &&
        sleep 15 &&
        /etc/confluent/docker/run
      "
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [hotel-net]

  hotel-booking:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-booking-app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: "8080"

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hotel_booking
      SPRING_DATASOURCE_USERNAME: hotel_admin
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/hotel_booking
      SPRING_DATA_MONGODB_DATABASE: hotel_booking

      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/hotel_booking
      SPRING_FLYWAY_USER: hotel_admin
      SPRING_FLYWAY_PASSWORD: postgres

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      SECURITY_JWT_SECRET: my_super_secret_key
      SECURITY_JWT_EXPIRATION: "86400000"

    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
      - ./logs:/workspace/logs
    working_dir: /workspace
    networks: [hotel-net]

networks:
  hotel-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  m2_cache: