name: java-backend

services:
  # -----------------------------
  # INFRA
  # -----------------------------

  # Social Network DB
  postgres-sn:
    image: postgres:16-alpine
    container_name: jb-postgres-sn
    environment:
      POSTGRES_DB: social_network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - jb_pgdata_sn:/var/lib/postgresql/data
      - ./docker/init-sn.sql:/docker-entrypoint-initdb.d/init-sn.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_network -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      jb-net:
        aliases:
          - postgres-db

  # Common DB for other pet projects (currency-exchange / hotel-booking / tg-bot)
  postgres-apps:
    image: postgres:16-alpine
    container_name: jb-postgres-apps
    environment:
      POSTGRES_DB: apps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - jb_pgdata_apps:/var/lib/postgresql/data
      - ./docker/init-apps.sql:/docker-entrypoint-initdb.d/init-apps.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apps -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      jb-net:
        aliases:
          - postgres

  mongodb:
    image: mongo:7
    container_name: jb-mongodb
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - jb_mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [jb-net]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: vk_insight
      MYSQL_USER: vk_insight
      MYSQL_PASSWORD: vk_insight_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - jb_mysql:/var/lib/mysql
      - ./vk_insight/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [jb-net]

  redis_db:
    image: redis:7-alpine
    container_name: jb-redis
    command: ["redis-server", "--requirepass", "redis"]
    ports:
      - "127.0.0.1:6379:6379"
    networks: [jb-net]

  # Searchengine DB
  postgres-searchengine:
    image: postgres:16-alpine
    container_name: jb-postgres-searchengine
    environment:
      POSTGRES_DB: ${SEARCHENGINE_DB_NAME:-search_engine}
      POSTGRES_USER: ${SEARCHENGINE_DB_USER:-search_engine_user}
      POSTGRES_PASSWORD: ${SEARCHENGINE_DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${SEARCHENGINE_DB_PORT:-5434}:5432"
    volumes:
      - jb_pgdata_searchengine:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SEARCHENGINE_DB_USER:-search_engine_user} -d ${SEARCHENGINE_DB_NAME:-search_engine} -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks: [jb-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: jb-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"
    networks: [jb-net]

  # Kafka with Zookeeper (Confluent)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: jb-kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: "12"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "127.0.0.1:9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 40
    networks: [jb-net]

  akhq:
    image: tchiotludo/akhq:0.24.0
    container_name: jb-akhq
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local:
              properties:
                bootstrap.servers: "kafka:9092"
    ports:
      - "127.0.0.1:8080:8080"
    networks: [jb-net]

  minio:
    image: minio/minio:latest
    container_name: jb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - jb_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks: [jb-net]

  # -----------------------------
  # APPS (GHCR)
  #   - GHCR_OWNER defaults to your GitHub username (iluxa9494)
  #   - TAG defaults to latest
  # -----------------------------

  sn-api-gateway:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-api-gateway:${TAG:-latest}
    container_name: jb-sn-api-gateway
    depends_on:
      eureka-server:
        condition: service_started
      postgres-sn:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    ports:
      - "127.0.0.1:8003:8765"
    networks: [jb-net]

  eureka-server:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-eureka-server:${TAG:-latest}
    container_name: jb-sn-eureka
    ports:
      - "127.0.0.1:8761:8761"
    networks: [jb-net]

  sn-auth-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-mc-authentication:${TAG:-latest}
    container_name: jb-sn-auth
    depends_on:
      eureka-server:
        condition: service_started
      postgres-sn:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis_db:
        condition: service_started
      kafka:
        condition: service_healthy
    env_file:
      - ./social_network/mc-authentication/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    networks: [jb-net]

  sn-notification-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-ms-notification:${TAG:-latest}
    container_name: jb-sn-notification
    depends_on:
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres-sn:
        condition: service_healthy
    env_file:
      - ./social_network/ms-notification/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    networks: [jb-net]

  sn-post-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-post:${TAG:-latest}
    container_name: jb-sn-post
    depends_on:
      eureka-server:
        condition: service_started
      postgres-sn:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    networks: [jb-net]

  sn-dialog-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-dialog-service:${TAG:-latest}
    container_name: jb-sn-dialog
    depends_on:
      eureka-server:
        condition: service_started
      postgres-sn:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

  sn-account-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-mc-account:${TAG:-latest}
    container_name: jb-sn-account
    depends_on:
      eureka-server:
        condition: service_started
      postgres-sn:
        condition: service_healthy
      redis_db:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    networks: [jb-net]

  sn-integration-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-integration:${TAG:-latest}
    container_name: jb-sn-integration
    depends_on:
      eureka-server:
        condition: service_started
      redis_db:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - ./social_network/social-network-integration/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      STORAGE_ACCESS_KEY_ID: "minio"
      STORAGE_SECRET_KEY: "minio12345"
    networks: [jb-net]

  sn-friend-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-friend-service:${TAG:-latest}
    container_name: jb-sn-friend
    depends_on:
      eureka-server:
        condition: service_started
      postgres-sn:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./social_network/social-network-friend-service/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    networks: [jb-net]

  sn-frontend:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-frontend:${TAG:-latest}
    container_name: jb-sn-frontend
    ports:
      - "127.0.0.1:8090:80"
    networks: [jb-net]

  # -----------------------------
  # OTHER PET PROJECTS (GHCR)
  # -----------------------------

  tariff-calculator:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-tariff-calculator:${TAG:-latest}
    build: ./tariff_calculator
    container_name: jb-tariff-calculator
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    ports:
      - "127.0.0.1:8006:8080"
    networks: [jb-net]

  currency-exchange:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-currency-exchange:${TAG:-latest}
    container_name: jb-currency-exchange
    depends_on:
      postgres-apps:
        condition: service_healthy
    env_file:
      - ./currency_exchange/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    ports:
      - "127.0.0.1:8001:8080"
    networks: [jb-net]

  hotel-booking:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-hotel-booking:${TAG:-latest}
    container_name: jb-hotel-booking
    depends_on:
      postgres-apps:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./hotel-booking/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    ports:
      - "127.0.0.1:8002:8081"
    networks: [jb-net]

  tg-bot:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-tg-bot:${TAG:-latest}
    container_name: jb-tg-bot
    depends_on:
      postgres-apps:
        condition: service_healthy
    env_file:
      - ./tg_bot/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      # Страховка на случай, если в образе старый application.yml с localhost
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-apps:5432/${DB_NAME:-cryptobot}"
      SPRING_DATASOURCE_USERNAME: "${DB_USER:-cryptobot}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-cryptobot_password_123}"
    volumes:
      # Чтобы gradle/скрипты, которые ищут .env в /app, не ругались
      - ./tg_bot/.env:/app/.env:ro
    networks: [jb-net]

  vk-insight:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-vk-insight:${TAG:-latest}
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./vk_insight/.env
    ports:
      - "0.0.0.0:8007:8084"
    networks: [jb-net]

  searchengine:
    profiles: ["searchengine"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-searchengine:${TAG:-latest}
    container_name: jb-searchengine
    depends_on:
      postgres-searchengine:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-searchengine:5432/${SEARCHENGINE_DB_NAME:-search_engine}"
      SPRING_DATASOURCE_USERNAME: "${SEARCHENGINE_DB_USER:-search_engine_user}"
      SPRING_DATASOURCE_PASSWORD: "${SEARCHENGINE_DB_PASSWORD:-postgres}"
    ports:
      - "127.0.0.1:8004:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/api/statistics >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [jb-net]

volumes:
  jb_pgdata_sn:
  jb_pgdata_apps:
  jb_pgdata_searchengine:
  jb_minio:
  jb_mongo:
  jb_mysql:

networks:
  jb-net:
    driver: bridge
