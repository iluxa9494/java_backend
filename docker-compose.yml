name: java-backend

services:
  # -----------------------------
  # INFRA
  # -----------------------------

  # Social Network DB
  postgres-sn:
    image: postgres:16-alpine
    container_name: jb-postgres-sn
    environment:
      POSTGRES_DB: social_network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - jb_pgdata_sn:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_network -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks: [jb-net]

  # Common DB for other pet projects (currency-exchange / hotel-booking / tg-bot)
  postgres-apps:
    image: postgres:16-alpine
    container_name: jb-postgres-apps
    environment:
      POSTGRES_DB: apps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - jb_pgdata_apps:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apps -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks: [jb-net]

  mongodb:
    image: mongo:7
    container_name: jb-mongodb
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - jb_mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [jb-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: jb-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"
    networks: [jb-net]

  # Kafka with Zookeeper (Confluent) — replaces unavailable bitnami/kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: jb-kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # Internal-only (recommended for VPS); keep 9092 bound to localhost on host
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: "12"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "127.0.0.1:9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 40
    networks: [jb-net]

  akhq:
    image: tchiotludo/akhq:0.24.0
    container_name: jb-akhq
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local:
              properties:
                bootstrap.servers: "kafka:9092"
    ports:
      - "127.0.0.1:8082:8080"
    networks: [jb-net]

  minio:
    image: minio/minio:latest
    container_name: jb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - jb_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks: [jb-net]

  # -----------------------------
  # APPS (GHCR)
  #   - GHCR_OWNER defaults to your GitHub username (iluxa9494)
  #   - TAG defaults to latest
  # -----------------------------

  sn-api-gateway:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-api-gateway:${TAG:-latest}
    container_name: jb-sn-api-gateway
    depends_on:
      postgres-sn:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    ports:
      - "8080:8080"
    networks: [jb-net]

  sn-auth-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-auth-service:${TAG:-latest}
    container_name: jb-sn-auth
    depends_on:
      postgres-sn:
        condition: service_healthy
    env_file:
      - ./social_network/mc-authentication/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

  sn-notification-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-notification-service:${TAG:-latest}
    container_name: jb-sn-notification
    depends_on:
      kafka:
        condition: service_healthy
      postgres-sn:
        condition: service_healthy
    env_file:
      - ./social_network/ms-notification/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

  sn-post-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-post-service:${TAG:-latest}
    container_name: jb-sn-post
    depends_on:
      postgres-sn:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./social_network/social-network-integration/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

  sn-user-service:
    profiles: ["social-network"]
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-social-network-user-service:${TAG:-latest}
    container_name: jb-sn-user
    depends_on:
      postgres-sn:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./social_network/social-network-friend-service/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

  # -----------------------------
  # OTHER PET PROJECTS (GHCR)
  # -----------------------------

  currency-exchange:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-currency-exchange:${TAG:-latest}
    container_name: jb-currency-exchange
    depends_on:
      postgres-apps:
        condition: service_healthy
    env_file:
      - ./currency_exchange/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

  hotel-booking:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-hotel-booking:${TAG:-latest}
    container_name: jb-hotel-booking
    depends_on:
      postgres-apps:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./hotel-booking/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

  tg-bot:
    image: ghcr.io/${GHCR_OWNER:-iluxa9494}/java_backend-tg-bot:${TAG:-latest}
    container_name: jb-tg-bot
    depends_on:
      postgres-apps:
        condition: service_healthy
    env_file:
      - ./tg_bot/.env
    environment:
      JAVA_TOOL_OPTIONS: "-Duser.timezone=UTC"
    networks: [jb-net]

volumes:
  jb_pgdata_sn:
  jb_pgdata_apps:
  jb_minio:
  jb_mongo:

networks:
  jb-net:
    driver: bridge