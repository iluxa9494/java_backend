services:
  postgres:
    image: postgres:16
    container_name: searchengine-postgres
    environment:
      POSTGRES_DB: search_engine
      POSTGRES_USER: search_engine_user
      POSTGRES_PASSWORD: search_engine_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search_engine_user -d search_engine"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - searchengine_pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: searchengine-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18082:8082"
    environment:
      # Переопределяем то, что в application.yml сейчас указывает на localhost  [oai_citation:3‡project_dump.txt](sediment://file_0000000026f071f4aa286c049eabe31e)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/search_engine
      SPRING_DATASOURCE_USERNAME: search_engine_user
      SPRING_DATASOURCE_PASSWORD: search_engine_password

      # полезно для контейнера, чтобы Spring корректно биндился
      SERVER_PORT: "8082"
    volumes:
      - ./logs:/app/logs

volumes:
  searchengine_pgdata: